<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b89030"/>
      <stop offset="45%" stop-color="#f8e060"/>
      <stop offset="100%" stop-color="#b89030"/>
    </linearGradient>
    <linearGradient id="guard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#11141a"/>

  <!-- Heart -->
  <path d="M50 49 C50 45 43 37 35 37 C22 37 22 52 22 52 C22 66 50 80 50 80 C50 80 78 66 78 52 C78 52 78 37 65 37 C57 37 50 45 50 49Z" fill="#c8484f"/>
  <!-- Heart sheen -->
  <path d="M37 40 C33 40 28 44 27 49 C29 45 33 42 38 41 C41 40 40 39 37 40Z" fill="#fff" opacity="0.18"/>

  <!-- Dagger blade -->
