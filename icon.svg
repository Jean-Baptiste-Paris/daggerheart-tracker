  <!-- Blade edge highlight -->
  <polygon points="50,7 52,51 50,59 49,51" fill="#fff" opacity="0.22"/>

  <!-- Guard -->
  <rect x="29" y="59" width="42" height="8" rx="4" fill="url(#guard)"/>
  <!-- Guard gems -->
  <circle cx="36" cy="63" r="2.5" fill="#c8484f" opacity="0.9"/>
  <circle cx="64" cy="63" r="2.5" fill="#c8484f" opacity="0.9"/>

  <!-- Handle -->
  <rect x="44" y="67" width="12" height="21" rx="3" fill="#6a3e14"/>
  <rect x="44" y="72" width="12" height="2" rx="1" fill="#3a2008" opacity="0.65"/>
  <rect x="44" y="77" width="12" height="2" rx="1" fill="#3a2008" opacity="0.65"/>
  <rect x="44" y="82" width="12" height="2" rx="1" fill="#3a2008" opacity="0.65"/>

  <!-- Pommel -->
  <ellipse cx="50" cy="91" rx="7" ry="6" fill="#b89030"/>
  <ellipse cx="48" cy="90" rx="3" ry="2" fill="#f0d860" opacity="0.45"/>
